# Render Blueprint — backend (FastAPI) only.
#
# In the free-tier production setup the three tiers live on the platform that
# serves each best:
#
#   * Frontend (Next.js) -> Vercel   (never sleeps, global CDN)
#   * Database (Postgres) -> Neon    (free, persistent — no 30-day expiry)
#   * Backend  (FastAPI)  -> Render  (this file), kept warm by a cron ping
#                                     (see .github/workflows/keep-warm.yml)
#
# Deploy/refresh: push to GitHub, then in the Render dashboard open the
# Blueprint and "Manual sync". Render prompts for the `sync: false` values
# below (your Neon URL, TMDB token, and the Vercel app URL). No card required.

services:
  - type: web
    name: filmclub-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon connection string (postgres://…?sslmode=require)
      - key: SECRET_KEY
        generateValue: true # Render generates a strong random value once
      - key: ENVIRONMENT
        value: production
      - key: TMDB_ACCESS_TOKEN
        sync: false # your TMDB v4 read access token
      - key: CORS_ORIGINS
        sync: false # your Vercel app URL, e.g. https://film-club.vercel.app
      - key: FRONTEND_URL
        sync: false # same Vercel app URL (used for links in emails)
