# Render Blueprint — free-tier deploy of the full Film Club stack.
#
#   1 free PostgreSQL instance
#   1 Docker web service for the FastAPI backend
#   1 Docker web service for the Next.js frontend
#
# Deploy: push this repo to GitHub, then in the Render dashboard choose
# "New +" → "Blueprint" and point it at the repo. Render reads this file,
# provisions everything, and asks only for the values marked `sync: false`
# (your TMDB token). No credit card is required for the free plans below.
#
# NOTE ON URLS: the cross-service URLs hardcode the predictable
# `https://<name>.onrender.com` form. Service names must be globally unique on
# Render; if a name is already taken, Render appends a random suffix and the
# real URL will differ. If that happens, update the three URL values below
# (CORS_ORIGINS, FRONTEND_URL, NEXT_PUBLIC_API_URL) to match the URLs Render
# shows in the dashboard, then redeploy.

databases:
  - name: filmclub-db
    plan: free
    databaseName: filmclub
    user: filmclub

services:
  # ---- Backend: FastAPI ----
  - type: web
    name: filmclub-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: filmclub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true # Render generates a strong random value
      - key: ENVIRONMENT
        value: production
      - key: TMDB_ACCESS_TOKEN
        sync: false # prompted for at deploy time — paste your TMDB v4 token
      - key: CORS_ORIGINS
        value: '["https://filmclub-web.onrender.com"]'
      - key: FRONTEND_URL
        value: https://filmclub-web.onrender.com

  # ---- Frontend: Next.js ----
  - type: web
    name: filmclub-web
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      # Baked into the client bundle at build time. Render exposes service env
      # vars as Docker build args, and the frontend Dockerfile declares a
      # matching `ARG NEXT_PUBLIC_API_URL`.
      - key: NEXT_PUBLIC_API_URL
        value: https://filmclub-api.onrender.com
