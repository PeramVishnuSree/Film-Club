name: Keep API warm

# Render's free web services spin down after ~15 minutes of inactivity, adding a
# ~50s cold-start delay to the next request. Pinging /health every ~10 minutes
# keeps the single backend instance awake. With the frontend on Vercel, this
# stays within Render's free 750 instance-hours/month budget (~744h for one
# always-on service).
#
# Notes:
#   * GitHub disables scheduled workflows after 60 days with no repo activity.
#   * Scheduled runs can be delayed several minutes under load; that's fine here.
#   * If you'd rather not spend Actions minutes (private repos get 2,000/month),
#     a free external pinger like cron-job.org or UptimeRobot works just as well.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          curl -fsS --max-time 60 --retry 2 --retry-delay 5 \
            https://filmclub-api.onrender.com/health \
            && echo "API is awake" \
            || echo "Ping failed (instance may be cold-starting); will retry next run"
