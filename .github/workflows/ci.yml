name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: filmclub
          POSTGRES_PASSWORD: filmclub
          POSTGRES_DB: filmclub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U filmclub"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # The Postgres service owner (filmclub) owns the database, so the schema
      # is writable without extra grants.
      TEST_DATABASE_URL: postgresql+asyncpg://filmclub:filmclub@localhost:5432/filmclub_test
      # Apps read settings from env; keep these deterministic for tests.
      SECRET_KEY: test-secret-key
      DATABASE_URL: postgresql+asyncpg://filmclub:filmclub@localhost:5432/filmclub_test

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations (smoke check)
        run: alembic upgrade head

      - name: Run tests
        run: pytest -q

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
